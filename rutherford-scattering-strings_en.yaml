a11y:
  screenSummary:
    rutherfordAtom:
      playArea: >-
        A source that can stream alpha particles onto a thin foil. 
        An observation window shows a highly magnified view of the foil. 
        You can adjust the energy of the alpha particles and the number of protons 
        and neutrons comprising the atoms in the foil.
      controlArea: >-
        You can choose between atomic and nuclear scale views of the experiment. 
        There are buttons to pause and step incrementally through observations and a 
        button to reset the sim.
      interactionHint: Turn on alpha particle source to begin observations.
    plumPuddingAtom:
      playArea: >-
        A source that can stream alpha particles onto a thin foil. 
        An observation window shows a highly magnified view of the foil. 
        You can adjust the energy of the alpha particles.
      controlArea: >-
        There are buttons to pause and step incrementally through observations and a 
        button to reset the sim.
      interactionHint: Turn on alpha particle source to begin observations.
  observationWindow: Observation Window
  atomSpaceDescription: >-
    An atomic scale view of the foil is shown. Portions of five tightly packed
    atoms are visible, with three nuclei visible in the scene.
  nucleusSpaceDescription: >-
    A nuclear scale view of the foil is shown. A single nucleus is
    visible with a representative number of protons and neutrons.
